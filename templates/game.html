<!DOCTYPE html>
<html>
<!--Top of "Gameboard" page-->
<head>
    <title>Gameboard for the Pitch Game</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<!--Body of "Home" page-->
<body>
    <div class="bid-display-panel">
        <span class="bid-display-label">Current Bid</span>
        <span class="bid-display-value">
            {% if user_bid is none %}
                Pending
            {% else %}
                {{ user_bid }}
            {% endif %}
        </span>
    </div>

    {% if show_bid_modal %}
        <div class="bid-modal-overlay">
            <div class="bid-modal">
                <h2>Select your bid</h2>
                <p>Choose a valid bid before playing your first card.</p>
                <form id="bid-form" class="bid-form" method="POST" action="/set_bid">
                    <div class="bid-stepper">
                        <button id="decrease-bid" class="bid-stepper-button" type="button">-</button>
                        <input id="bid-input" name="bid" type="number" min="0" max="18" value="0" required>
                        <button id="increase-bid" class="bid-stepper-button" type="button">+</button>
                    </div>
                    <button class="confirm-bid-button" type="submit">Confirm bid</button>
                </form>
            </div>
        </div>
    {% endif %}

    <!--Displaying the picture of the card and selecting one-->
    <div class = "hand-position-user">
        <form method="POST" action="/play_card">
            {% for image_path in hand_images %}
                <button type="submit" name="index" value="{{ loop.index0 }}" class="card-button" {% if show_bid_modal %}disabled{% endif %}>
                    <img src="{{ image_path }}" class="card-image">
                </button>
            {% endfor %}
        </form>
    </div>

    <div class = "deck-stack">
        {% for card_path in played_images %}
            <img src="{{ card_path }}" class="card-image">
        {% endfor %}
    </div>

    <!--Style of the page-->
    <style>
        html, body {
            background-color: lightgreen;            
            font-family: Arial, sans-serif;
            margin: 0px;
            padding: 0px;
        }
    </style>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
